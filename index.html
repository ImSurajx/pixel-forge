<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelForge: Image Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="shortcut icon" href="./assets/image.png" type="image/x-icon">
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <main>
        <nav>
            <div class="logo">
                PixelForge
            </div>
            <div class="nav-btns">
                <div class="reset-btn">Reset All</div>
                <div class="download-btn">Download</div>
            </div>
        </nav>
        <div class="container">
            <div class="presets">
                <div class="details">
                    <div class="title">Presets</div>
                    <div class="desc">CREATIVE FILTERS</div>
                </div>
                <div class="filter-container">
                    <div class="vivid outer">
                        <div class="img-preview">
                            <img src="#" alt="">
                        </div>
                        <div class="filter-type">Vivid</div>
                    </div>
                    <div class="mono outer">
                        <div class="img-preview">
                            <img src="#" alt="">
                        </div>
                        <div class="filter-type ">Mono</div>
                    </div>
                    <div class="sepia outer">
                        <div class="img-preview">
                            <img src="#" alt="">
                        </div>
                        <div class="filter-type">Sepia</div>
                    </div>
                    <div class="cool-arctic outer">
                        <div class="img-preview">
                            <img src="#" alt="">
                        </div>
                        <div class="filter-type">Cool Arctic</div>
                    </div>
                </div>
            </div>

            <div class="imgxtool-container">
                <div class="img-container">
                    <label for="choose-image"></label>
                    <input type="file" name="#" id="choose-image" hidden>
                    <img id="preview" src="https://images.unsplash.com/photo-1756086807815-d8c4676197dc?q=80&w=1287&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">

                    <div class="tools">
                        <div class="magni-tool">
                            <i class="ri-zoom-in-line"></i>
                            <span class="zoom">100%</span>
                            <i class="ri-zoom-out-line"></i>
                        </div>
                        <hr>
                        <div class="crop">
                            <i class="ri-crop-line"></i>
                        </div>
                        <div class="rotate">
                            <i class="ri-anticlockwise-2-line"></i>
                        </div>
                        <div class="mirror">
                            <i class="ri-flip-horizontal-line"></i>
                        </div>
                    </div>
                </div>

            </div>
            <div class="adjustments">
                <div class="title">
                    Adjustments
                </div>
                <div class="desc">
                    PARAMETERS
                </div>
                <div class="paramters">
                    <div class="brightness-img">
                        <div class="labels">
                            <label for="brightness">Brightness</label>
                            <label for="brightness">100%</label>
                        </div>
                        <input type="range" name="brightness" id="brightness" min="0" max="200" value="100">
                    </div>

                    <div class="contrast-img">
                        <div class="labels">
                            <label for="contrast">Contrast</label>
                            <label for="contrast">100%</label>
                        </div>
                        <input type="range" name="contrast" id="contrast" min="0" max="200" value="100">
                    </div>

                    <div class="saturation-img">
                        <div class="labels">
                            <label for="saturation">Saturation</label>
                            <label for="saturation">100%</label>
                        </div>
                        <input type="range" name="saturation" id="saturation" min="0" max="200" value="100">
                    </div>

                    <div class="hue-img">
                        <div class="labels">
                            <label for="hue">Hue</label>
                            <label for="hue">0°</label>
                        </div>
                        <input type="range" name="hue" id="hue" min="0" max="360" value="0">
                    </div>

                    <div class="exposure-img">
                        <div class="labels">
                            <label for="exposure">Exposure</label>
                            <label for="exposure">100%</label>
                        </div>
                        <input type="range" name="exposure" id="exposure" min="0" max="200" value="100">
                    </div>

                </div>
                <div class="para-btns">
                    <div class="auto">AUTOMATICS</div>
                    <div class="auto-enhance btn">
                        <div class="text">Auto-enhance</div>
                        <div class="toggle">
                            <div class="circle"></div>
                        </div>
                    </div>
                    <div class="smart-sharpen btn">
                        <div class="text" >Smart Sharpen</div>
                        <div class="toggle">
                            <div class="circle"></div>
                        </div>
                    </div>
                    <div class="auto-adjust normal-btn">
                        <i class="ri-sparkling-line"></i> AUTO ADJUST
                    </div>
                    <div class="revert-all normal-btn">
                        <i class="ri-history-line"></i> REVERT ALL
                    </div>

                </div>
            </div>
        </div>
    </main>
    <script src="./js/script.js"></script>
</body>

</html>
