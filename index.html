<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelForge: Image Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="./assets/image.png" type="image/x-icon">
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <main>
        <nav>
            <div class="logo">
                PixelForge
            </div>
            <div class="nav-btns">
                <div class="reset-btn">Reset All</div>
                <div class="download-btn">Download</div>
            </div>
        </nav>
        <div class="container">
            <div class="presets">
                <div class="details">
                    <div class="title">Presets</div>
                    <div class="desc">CREATIVE FILTERS</div>
                </div>
                <div class="filter-container">
                    <div class="vivid outer" >
                        <div class="img-preview">
                            <img src="#" alt="">
                        </div>
                        <div class="filter-type">Vivid</div>
                    </div>
                    <div class="mono outer">
                        <div class="img-preview">
                            <img src="#" alt="">
                        </div>
                        <div class="filter-type ">Mono</div>
                    </div>
                    <div class="sepia outer">
                        <div class="img-preview">
                            <img src="#" alt="">
                        </div>
                        <div class="filter-type">Sepia</div>
                    </div>
                    <div class="cool-arctic outer">
                        <div class="img-preview">
                            <img src="#" alt="">
                        </div>
                        <div class="filter-type">Cool Arctic</div>
                    </div>
                </div>
            </div>
            <div class="img-container"></div>
            <div class="adjustments"></div>
        </div>
    </main>
    <script src="./js/script.js"></script>
</body>

</html>
